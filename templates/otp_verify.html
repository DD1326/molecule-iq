<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP — MoleculeIQ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      background-color: var(--bg);
    }
    
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: rgba(13, 17, 32, 0.6);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), var(--glow2);
      text-align: center;
      animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .otp-inputs {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px 0;
    }

    .otp-input {
      width: 100%;
      background: rgba(6, 8, 16, 0.5);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      color: var(--text);
      font-size: 1.5rem;
      font-family: var(--font-mono);
      text-align: center;
      letter-spacing: 0.5em;
      transition: all var(--transition);
      outline: none;
    }

    .otp-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px rgba(0, 149, 255, 0.15);
    }

    .btn-verify {
      width: 100%;
      background: linear-gradient(135deg, var(--accent2), #006aff);
      color: #fff;
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }

    .flash-error {
      background: rgba(255, 94, 138, 0.1);
      border: 1px solid var(--accent3);
      color: var(--accent3);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: 20px;
    }

    .login-subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .timer {
      font-size: 0.8rem;
      color: var(--accent2);
      margin-top: 20px;
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>
  <div class="orb orb-blue"></div>
  <div class="orb orb-green"></div>

  <div class="login-wrapper">
    <h1 class="login-title">Verify OTP</h1>
    <p class="login-subtitle">We've sent a 6-digit code to <strong>{{ session.pending_email }}</strong>.</p>
    
    {% if error %}
    <div class="flash-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('verify_otp') }}">
      <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" pattern="\d{6}" required autofocus />
      
      <button type="submit" class="btn-verify">Complete Authentication ➔</button>
    </form>

    <div class="timer" id="timer">Code expires in 10:00</div>
    
    <a href="{{ url_for('login') }}" style="display: block; margin-top: 24px; color: var(--text-muted); font-size: 0.8rem; text-decoration: none;">← Back to login</a>
  </div>

  <script>
    let seconds = 600;
    const timerEl = document.getElementById('timer');
    const interval = setInterval(() => {
      seconds--;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      timerEl.innerText = `Code expires in ${m}:${s < 10 ? '0' : ''}${s}`;
      if (seconds <= 0) {
        clearInterval(interval);
        timerEl.innerText = "OTP Expired";
        timerEl.style.color = "var(--accent3)";
      }
    }, 1000);
  </script>
</body>
</html>
